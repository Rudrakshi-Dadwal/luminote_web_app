services:
  - type: web
    name: luminote-api
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Set in Render dashboard
      - key: ENABLE_WHISPER_FALLBACK
        value: true
      - key: WHISPER_MODEL
        value: tiny